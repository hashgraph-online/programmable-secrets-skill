name: Skills Publish

on:
  release:
    types: [published]
  push:
    branches:
      - main
    paths:
      - SKILL.md
      - skill.json
      - package.json
      - schemas/**
      - .github/actions/skills-publish/**
      - .github/workflows/skills-publish.yml
  workflow_dispatch:
    inputs:
      version:
        description: Optional skill version override
        required: false
      api-base-url:
        description: Optional broker API override
        required: false
      request-timeout-ms:
        description: Optional per-request HTTP timeout override
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install validation dependencies
        run: npm install --no-save ajv@8 ajv-formats@3
      - name: Validate skill manifest schema
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const Ajv2020 = require('ajv/dist/2020').default;
          const addFormats = require('ajv-formats').default;
          const schema = JSON.parse(fs.readFileSync('schemas/skill.schema.json', 'utf8'));
          const manifest = JSON.parse(fs.readFileSync('skill.json', 'utf8'));
          const ajv = new Ajv2020({ allErrors: true, strict: false });
          addFormats(ajv);
          const validate = ajv.compile(schema);
          const ok = validate(manifest);
          if (!ok) {
            console.error(JSON.stringify(validate.errors, null, 2));
            process.exit(1);
          }
          console.log('Schema validation passed for skill.json');
          NODE
      - name: Prepare publish package
        id: package
        shell: bash
        run: |
          PACKAGE_DIR=".publish-package-${GITHUB_RUN_ID}"
          mkdir -p "${PACKAGE_DIR}/schemas"
          cp SKILL.md skill.json package.json "${PACKAGE_DIR}/"
          cp schemas/skill.schema.json "${PACKAGE_DIR}/schemas/"
          echo "dir=${PACKAGE_DIR}" >> "$GITHUB_OUTPUT"
      - name: Resolve version
        id: vars
        shell: bash
        run: |
          SKILL_NAME=$(node -e "const fs=require('node:fs'); const skill=JSON.parse(fs.readFileSync('skill.json','utf8')); const value=typeof skill.name==='string'?skill.name.trim():''; process.stdout.write(value);")
          if [[ -z "$SKILL_NAME" ]]; then
            echo "skill.json must include a non-empty name"
            exit 1
          fi
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [[ -z "$PACKAGE_VERSION" ]]; then
            echo "package.json must include version"
            exit 1
          fi
          VERSION_INPUT="${{ github.event.inputs.version }}"
          if [[ "${{ github.event_name }}" == "release" && -z "$VERSION_INPUT" ]]; then
            VERSION_INPUT="${GITHUB_REF_NAME#v}"
          fi
          if [[ -z "$VERSION_INPUT" ]]; then
            VERSION_INPUT="$PACKAGE_VERSION"
          fi
          echo "name=$SKILL_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION_INPUT" >> "$GITHUB_OUTPUT"
      - name: Resolve broker API URL
        id: target
        shell: bash
        run: |
          API_BASE_URL_INPUT="${{ github.event.inputs.api-base-url }}"
          if [[ -n "$API_BASE_URL_INPUT" ]]; then
            API_BASE_URL="$API_BASE_URL_INPUT"
          else
            API_BASE_URL="${{ secrets.RB_BASE_URL }}"
          fi
          if [[ -z "$API_BASE_URL" ]]; then
            API_BASE_URL="https://registry.hashgraphonline.com/api/v1"
          fi
          echo "api_base_url=$API_BASE_URL" >> "$GITHUB_OUTPUT"
      - name: Publish skill package
        uses: ./.github/actions/skills-publish
        with:
          api-base-url: ${{ steps.target.outputs.api_base_url }}
          api-key: ${{ secrets.RB_API_KEY }}
          account-id: ${{ secrets.RB_ACCOUNT_ID }}
          skill-dir: ${{ steps.package.outputs.dir }}
          name: ${{ steps.vars.outputs.name }}
          version: ${{ steps.vars.outputs.version }}
          request-timeout-ms: ${{ github.event.inputs.request-timeout-ms || '120000' }}
          annotate: "true"
          github-token: ${{ github.token }}
